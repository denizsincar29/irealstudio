name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS artifact'
        type: boolean
        default: false
      create_release:
        description: 'Create a GitHub release after building'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: irealstudio-windows
            output_filename: irealstudio.exe
            dist_dir: irealstudio-windows
            package_file: irealstudio-windows.zip
          - os: ubuntu-latest
            artifact_name: irealstudio-linux
            output_filename: irealstudio-linux
            dist_dir: irealstudio-linux
            package_file: irealstudio-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # wxPython wheels are not available for all Linux environments; install
      # build tools and the GTK headers so pip can build from source if needed.
      # These must come BEFORE `uv sync` so that native extensions
      # (wxPython, sounddevice) can compile successfully when no binary wheel
      # is available.
      - name: Install Linux GTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            freeglut3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libsm-dev \
            libxext-dev \
            libxrender-dev \
            libxxf86vm-dev \
            libnotify-dev \
            libsdl2-dev \
            portaudio19-dev \
            ccache \
            patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build executable
        uses: Nuitka/Nuitka-Action@v1.4
        with:
          nuitka-version: "4.0.5"
          script-name: main.py
          # Standalone mode avoids Windows Defender false-positives on single-file
          # executables.  The output directory is zipped/tarred in the next step.
          mode: standalone
          output-filename: ${{ matrix.output_filename }}
          output-dir: dist
          windows-console-mode: disable
          assume-yes-for-downloads: true
          no-progressbar: true
          quiet: true
          follow-imports: true
          # Include localisation (.mo) files so translations work in the build
          include-data-dir: locales=locales

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Nuitka names the standalone output directory after the script: main.dist
          Rename-Item -Path "dist\main.dist" -NewName "${{ matrix.dist_dir }}"
          Compress-Archive -Path "dist\${{ matrix.dist_dir }}" -DestinationPath "dist\${{ matrix.package_file }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          # Nuitka names the standalone output directory after the script: main.dist
          mv dist/main.dist dist/${{ matrix.dist_dir }}
          tar -czf dist/${{ matrix.package_file }} -C dist ${{ matrix.dist_dir }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.package_file }}
          if-no-files-found: error

  build_macos:
    name: Build on macos-latest
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_macos == true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install macOS audio deps
        run: brew install portaudio

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build executable
        uses: Nuitka/Nuitka-Action@v1.4
        with:
          nuitka-version: "4.0.5"
          script-name: main.py
          mode: onefile
          output-filename: irealstudio-macos
          output-dir: dist
          windows-console-mode: disable
          assume-yes-for-downloads: true
          no-progressbar: true
          quiet: true
          follow-imports: true
          # Embed localisation (.mo) files inside the single macOS binary
          include-data-dir: locales=locales

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: irealstudio-macos
          path: dist/irealstudio-macos
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, build_macos]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.build_macos.result != 'cancelled' &&
      startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' || inputs.create_release == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read news.md
        id: changelog
        run: |
          # news.md contains only the current release notes; use it as-is.
          cp news.md release_notes.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          files: |
            artifacts/irealstudio-windows/irealstudio-windows.zip
            artifacts/irealstudio-linux/irealstudio-linux.tar.gz
            artifacts/irealstudio-macos/irealstudio-macos
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
