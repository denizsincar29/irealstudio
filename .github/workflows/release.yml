name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_macos:
        description: 'Build macOS artifact'
        type: boolean
        default: false
      create_release:
        description: 'Create a GitHub release after building'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: irealstudio-windows
            output_filename: irealstudio.exe
            dist_dir: irealstudio-windows
            package_file: irealstudio-windows.zip
          - os: ubuntu-latest
            artifact_name: irealstudio-linux
            output_filename: irealstudio-linux
            dist_dir: irealstudio-linux
            package_file: irealstudio-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # wxPython wheels are not available for all Linux environments; install
      # build tools and the GTK headers so pip can build from source if needed.
      # These must come BEFORE `uv sync` so that native extensions
      # (wxPython, sounddevice) can compile successfully when no binary wheel
      # is available.
      - name: Install Linux GTK deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            freeglut3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpng-dev \
            libjpeg-dev \
            libtiff-dev \
            libsm-dev \
            libxext-dev \
            libxrender-dev \
            libxxf86vm-dev \
            libnotify-dev \
            libsdl2-dev \
            portaudio19-dev \
            ccache \
            patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Get accessible_output3 lib path
        id: ao3_path
        shell: bash
        run: uv run python -c "import os,accessible_output3; p=os.path.join(os.path.dirname(accessible_output3.__file__),'lib'); print('lib_path='+p.replace('\\\\','/'))" >> "$GITHUB_OUTPUT"

      - name: Build executable
        # shell: bash uses Git Bash on Windows runners (always available on
        # GitHub-hosted runners) so that the same script runs on all platforms.
        shell: bash
        run: |
          # Build the standalone executable using the same flags as compile.bat.
          # --windows-console-mode is Windows-only; skip it on Linux.
          # $RUNNER_OS is set by GitHub Actions to 'Windows', 'Linux', or 'macOS'.
          NUITKA_FLAGS=(
            --mode=standalone
            "--output-file=${{ matrix.output_filename }}"
            --output-dir=dist
            --assume-yes-for-downloads
            --follow-imports
            "--include-data-dir=locales=locales"
            "--include-data-dir=templates=templates"
            "--include-data-files=news.md=news.md"
            "--include-data-dir=${{ steps.ao3_path.outputs.lib_path }}=accessible_output3/lib"
            --include-module=mido.backends.rtmidi
            --nofollow-import-to=unittest
            --nofollow-import-to=doctest
            --nofollow-import-to=pdb
            --nofollow-import-to=tkinter
            --nofollow-import-to=test
          )
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            NUITKA_FLAGS+=(--windows-console-mode=disable)
          fi
          uv run python -m nuitka "${NUITKA_FLAGS[@]}" main.py

      - name: Copy accessible_output3 DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Nuitka's --include-data-dir can silently skip DLLs; copy explicitly.
          $dest = "dist\main.dist\accessible_output3\lib"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "${{ steps.ao3_path.outputs.lib_path }}\*" -Destination $dest -Force

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "register_openwith_windows.bat" -Destination "dist\main.dist\register_openwith_windows.bat" -Force
          # Nuitka names the standalone output directory after the script: main.dist
          Rename-Item -Path "dist\main.dist" -NewName "${{ matrix.dist_dir }}"
          Compress-Archive -Path "dist\${{ matrix.dist_dir }}" -DestinationPath "dist\${{ matrix.package_file }}"

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          # Nuitka names the standalone output directory after the script: main.dist
          mv dist/main.dist dist/${{ matrix.dist_dir }}
          tar -czf dist/${{ matrix.package_file }} -C dist ${{ matrix.dist_dir }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.package_file }}
          if-no-files-found: error

  build_macos:
    name: Build on macos-latest
    runs-on: macos-latest
    if: github.event_name == 'push' || inputs.build_macos == true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install macOS audio deps
        run: brew install portaudio

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Get accessible_output3 lib path
        id: ao3_path
        shell: bash
        run: uv run python -c "import os,accessible_output3; p=os.path.join(os.path.dirname(accessible_output3.__file__),'lib'); print('lib_path='+p.replace('\\\\','/'))" >> "$GITHUB_OUTPUT"

      - name: Build executable
        run: |
          # Build a single self-contained binary using the same flags as compile.sh.
          uv run python -m nuitka \
            --mode=app \
            --output-file=irealstudio-macos \
            --output-dir=dist \
            --assume-yes-for-downloads \
            --follow-imports \
            "--include-data-dir=locales=locales" \
            "--include-data-dir=templates=templates" \
            "--include-data-files=news.md=news.md" \
            "--include-data-dir=${{ steps.ao3_path.outputs.lib_path }}=accessible_output3/lib" \
            --include-module=mido.backends.rtmidi \
            --nofollow-import-to=unittest \
            --nofollow-import-to=doctest \
            --nofollow-import-to=pdb \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=test \
            main.py
          chmod +x dist/irealstudio-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: irealstudio-macos
          path: dist/irealstudio-macos
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build, build_macos]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build.result == 'success' &&
      needs.build_macos.result != 'cancelled' &&
      startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'push' || inputs.create_release == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read news.md
        id: changelog
        run: |
          # news.md contains only the current release notes; use it as-is.
          cp news.md release_notes.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          files: |
            artifacts/irealstudio-windows/irealstudio-windows.zip
            artifacts/irealstudio-linux/irealstudio-linux.tar.gz
            artifacts/irealstudio-macos/irealstudio-macos
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
